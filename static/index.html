<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FastAPI QnA</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    #response { margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>FastAPI QnA Frontend</h1>
  <textarea id="question" rows="4" cols="50" placeholder="Type your question here..."></textarea><br>
  <button id="askBtn">Ask</button>
  <div id="response"></div>

  <script>
    document.getElementById('askBtn').onclick = async () => {
      const q = document.getElementById('question').value;
      document.getElementById('response').textContent = 'Thinking...';

      const form = new FormData();
      form.append('question', q);

      const resp = await fetch('/ask', {
        method: 'POST',
        body: form
      });

      if (resp.ok) {
        const data = await resp.json();
        document.getElementById('response').textContent = data.answer || data.error || JSON.stringify(data);
      } else {
        document.getElementById('response').textContent = 'Error: ' + resp.status;
      }
    };
  </script>
</body>
</html>
